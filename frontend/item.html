<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MacSphere - Product Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>

  <body class="bg-gray-100 p-6">
    <div class="w-full max-w-7xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
        <header class="flex items-center justify-between px-8 py-6 bg-white border-b border-gray-100">
            <div class="text-2xl font-bold text-gray-900">Product Management</div>
            <nav class="flex items-center gap-4 text-sm text-gray-600">
                <a href="dashboard.html">Dashboard</a>
                <a href="home.html">Shop</a>
            </nav>
        </header>

        <main class="p-6">
            <div class="mb-4 flex justify-between items-center">
                <input type="text" id="itemSearch" placeholder="Search products..." class="form-control w-64">
                <button type="button" id="addItemBtn" class="btn btn-primary">+ Add Product</button>
            </div>
            <div class="table-responsive">
                <table id="itable" class="table table-striped table-hover w-100">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Image</th>
                      <th>Title</th>
                      <th>Sell Price</th>
                      <th>Cost Price</th>
                      <th>Stock</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
            </div>

            <div class="modal fade" id="itemModal" role="dialog">
              <div class="modal-dialog modal-lg">
                <div class="modal-content">
                  <div class="modal-header">
                    <h4 class="modal-title">Product</h4>
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                  </div>
                  <div class="modal-body">
                    <form id="iform">
                      <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required />
                      </div>
                      <div class="form-group">
                        <label for="desc">Description</label>
                        <textarea class="form-control" id="desc" name="description" rows="3"></textarea>
                      </div>
                      <div class="form-group">
                        <label for="category_id">Category</label>
                        <select class="form-control" id="category_id" name="category_id" required></select>
                      </div>
                      <div class="form-row">
                        <div class="form-group col-md-6">
                          <label for="sell">Sell Price</label>
                          <input type="number" step="0.01" class="form-control" id="sell" name="sell_price" required />
                        </div>
                        <div class="form-group col-md-6">
                          <label for="cost">Cost Price</label>
                          <input type="number" step="0.01" class="form-control" id="cost" name="cost_price" required />
                        </div>
                      </div>
                      <div class="form-group">
                        <label for="qty">Stock Quantity</label>
                        <input type="number" class="form-control" id="qty" name="stock_quantity" value="0" />
                      </div>
                      <div class="form-group">
                        <label for="img">Image</label>
                        <input type="file" class="form-control" id="img" name="image" accept="image/*" />
                      </div>
                    </form>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button id="itemSubmit" type="button" class="btn btn-primary">Save</button>
                    <button id="itemUpdate" type="button" class="btn btn-primary" style="display:none;">Update</button>
                  </div>
                </div>
              </div>
            </div>
        </main>

        <footer class="bg-white border-t border-gray-100 p-6 text-center text-sm text-gray-500">© MacSphere</footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.bootstrap4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.32/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.3.5/js/buttons.html5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/item.js"></script>
  </body>
</html>
