<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deactivate Account - MacSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css" />
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 p-6">
      <header class="mb-4">
        <div class="text-2xl font-bold text-gray-900">MacSphere</div>
      </header>
      <main>
        <form id="deactivateForm">
          <h2 class="text-xl font-semibold mb-4">Deactivate Account</h2>
          <div class="mb-4">
            <label for="email" class="block text-sm text-gray-600 mb-2">Email:</label>
            <input type="email" id="email" name="email" required class="w-full rounded-lg border border-gray-200 p-3" />
          </div>
          <button id="deactivateBtn" type="submit" class="w-full bg-[#1e5aff] text-white py-3 rounded-lg">Deactivate</button>
        </form>
      </main>
      <footer class="mt-6 text-sm text-gray-500">© MacSphere</footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/user.js"></script>
  </body>
</html>
