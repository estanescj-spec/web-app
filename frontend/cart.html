<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacSphere - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
        <header class="flex items-center justify-between px-8 py-6 bg-white">
            <div class="text-2xl font-bold text-gray-900">MacSphere</div>
            <nav class="text-gray-600">
                <a href="home.html" class="text-sm font-medium">Home</a>
            </nav>
        </header>

        <main class="p-8">
            <div class="container mx-auto">
                <h1 class="text-2xl font-semibold mb-4">Your Cart</h1>
                <div id="cartTable" class="mb-4"></div>
                <div class="flex gap-3">
                    <a href="home.html" class="btn btn-secondary">Continue Shopping</a>
                    <button id="checkoutBtn" class="btn btn-primary">Checkout</button>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t border-gray-100 p-6 text-center text-sm text-gray-500">© MacSphere</footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
